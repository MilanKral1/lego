<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Milan Král, Karel Křiva, Filip Henri Agba">
    <meta name="keywords" content="lego, stavebnice">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <title>LEGO Production s. r. o.</title>
    <link rel="shortcut icon" href="LEGO_logo.svg.png" type="image/x-icon">
</head>

<body>
    <!-- Announcement Bar -->
    <div class="announcement-bar">
  <button class="arrow-btn" onclick="changeMessage(-1)">&#8249;</button>
  <div class="announcement-wrapper">
    <p class="announcement-content" id="message">
      🖐️ My jsme LEGO <a href="#">More info</a>
    </p>
  </div>
  <button class="arrow-btn" onclick="changeMessage(1)">&#8250;</button>
</div>
    <!-- Navigation -->
    <nav>
      <div class="hamburger-menu" id="sidebar">
        <span class="hamburger-span1"></span>
        <span></span>
        <span class="hamburger-span2"></span>
      </div>
        <div class="a-container">
            <a href="#" class="a-text"><img src="House-icon.png" alt="Ikona domu" class="house-icon">DOMŮ <span class="arrow-icon-span1"></span><span></span></a>
            <a href="#" class="a-text"><img src="LEGO-brick.png" alt="Ikona kostky" class="brick-icon">PRODUKTY <span class="arrow-icon-span1"></span><span></span></a>
            <a href="#" class="a-img"><img src="LEGO_logo.svg.png" alt="logo"></a>
            <a href="#" class="a-text"><img src="Onas.png" alt="Ikona lidí" class="people-icon">O NÁS <span class="arrow-icon-span1"></span><span></span></a>
            <a href="#" class="a-text"><img src="Kontakt.png" alt="Ikona telefonu" class="phone-icon">KONTAKT <span class="arrow-icon-span1"></span><span></span></a>

            </div>
        </div>
        <div class="tablet-logo-container">
          <a href="#" class="a-img2"><img src="LEGO_logo.svg.png" alt="logo"></a>
        </div>
    </nav>
    <!-- Hero Section -->
    <div class="outside">
    <div class="hero">
        <h2>Svět, kde nápady ožívají</h2>
        <div class="hero-buttons">
            <button>Do obchodu</button>
            <button class="btn2">Další info</button>
        </div>
    </div>
</div>

    
    <script>
    //JavaScript for Announcement Bar
        const messages = [
  '🖐️ My jsme LEGO <a href="#">More info</a>',
  '🎉 Noví LEGO Pokémoni <a href="#">Shop</a>',
  '🔥 Přidej se k nám <a href="#">More info</a>',
];

let current = 0;
let isAnimating = false;

function changeMessage(direction) {
  if (isAnimating) return;
  isAnimating = true;

  const el = document.getElementById('message');
  const outClass = direction === 1 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = direction === 1 ? 'slide-in-right' : 'slide-in-left';

  // Slide current message out
  el.classList.add(outClass);

  setTimeout(() => {
    // Swap content and reset position
    current = (current + direction + messages.length) % messages.length;
    el.innerHTML = messages[current];
    el.classList.remove(outClass);

    // Force reflow so animation restarts cleanly
    void el.offsetWidth;

    // Slide new message in
    el.classList.add(inClass);

    setTimeout(() => {
      el.classList.remove(inClass);
      isAnimating = false;
    }, 350);

  }, 350);
}
  // JavaScript for Hamburger Menu
  const hamburger = document.getElementById("sidebar");
  const navLinks = document.querySelector(".a-container");

  hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });

    </script>

    
</body>

</html>
